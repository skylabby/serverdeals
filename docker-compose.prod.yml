# ──────────────────────────────────────────────────────────────────────────────
# ServerDeals — Docker Compose (production overrides)
# ──────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serverdeals -d serverdeals"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
