# Alembic configuration for ServerDeals (async PostgreSQL)

[alembic]
# Path to the migration scripts
script_location = backend/db/migrations

# Logging
# file_template = %%(rev)s_%%(slug)s

# SQLAlchemy connection — set via env.py (reads DATABASE_URL from environment)
sqlalchemy.url =

# Logging config
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
