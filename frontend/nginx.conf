# ──────────────────────────────────────────────────────────────────────────────
# ServerDeals — Nginx configuration
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Serve static files from Vite build output
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Hashed assets (JS/CSS with content hash from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── eBay webhook proxy (for production keyset verification) ──────────────
    location /ebay-notification {
        proxy_pass http://backend:8000/ebay-notification;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Single-page app: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for potentially slow eBay API calls
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
